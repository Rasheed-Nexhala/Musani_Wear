<nav
  class="bg-white border-b border-border shadow-sm sticky top-0 z-40"
  role="navigation"
  aria-label="Main navigation"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16 md:h-20">
      <!-- Logo -->
      <a
        routerLink="/"
        (click)="closeMobileMenu()"
        class="text-2xl md:text-3xl font-display font-bold text-charcoal hover:text-gold transition-colors focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 min-h-[48px] min-w-[48px] inline-flex items-center"
        aria-label="Musani Wear - Home"
      >
        Musani Wear
      </a>

      <!-- Desktop Navigation Links (hidden on mobile) -->
      <div class="hidden md:flex items-center gap-8">
        <a
          routerLink="/"
          routerLinkActive="border-b-2 border-gold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-gray-700 hover:text-gold transition-colors py-2 min-h-[48px] inline-flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 rounded"
        >
          Home
        </a>
        <a
          routerLink="/shop"
          routerLinkActive="border-b-2 border-gold"
          class="text-gray-700 hover:text-gold transition-colors py-2 min-h-[48px] inline-flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 rounded"
        >
          Shop
        </a>
        @if (isAuthenticated$ | async) {
          <a
            routerLink="/admin"
            class="text-gray-700 hover:text-gold transition-colors py-2 min-h-[48px] inline-flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 rounded"
          >
            Admin
          </a>
        } @else {
          <a
            routerLink="/admin/login"
            class="inline-flex min-h-[48px] items-center rounded-full border border-gold/40 bg-gold/10 px-4 py-2 text-sm font-semibold text-charcoal transition-all duration-200 hover:bg-gold/20 focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2"
          >
            Login
          </a>
        }
      </div>

      <!-- Mobile Hamburger Button -->
      <button
        type="button"
        class="md:hidden min-h-[48px] min-w-[48px] flex items-center justify-center rounded-md text-charcoal hover:bg-cream focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="mobileMenuOpen()"
        [attr.aria-label]="mobileMenuOpen() ? 'Close menu' : 'Open menu'"
      >
        @if (mobileMenuOpen()) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile Drawer (slide-in menu) -->
  @if (mobileMenuOpen()) {
    <div
      class="fixed inset-0 z-30 md:hidden"
      role="dialog"
      aria-modal="true"
      aria-label="Mobile navigation menu"
    >
      <!-- Backdrop -->
      <div
        class="absolute inset-0 bg-charcoal/50"
        (click)="closeMobileMenu()"
        aria-hidden="true"
      ></div>

      <!-- Drawer Panel -->
      <div
        class="absolute top-0 right-0 w-64 max-w-[85vw] h-full bg-white shadow-xl flex flex-col pt-20 px-4"
      >
        <a
          routerLink="/"
          routerLinkActive="border-l-4 border-gold pl-2"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
          class="py-4 px-4 text-gray-700 hover:text-gold font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset rounded"
        >
          Home
        </a>
        <a
          routerLink="/shop"
          routerLinkActive="border-l-4 border-gold pl-2"
          (click)="closeMobileMenu()"
          class="py-4 px-4 text-gray-700 hover:text-gold font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset rounded"
        >
          Shop
        </a>
        @if (isAuthenticated$ | async) {
          <a
            routerLink="/admin"
            (click)="closeMobileMenu()"
            class="py-4 px-4 text-gray-700 hover:text-gold font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset rounded"
          >
            Admin
          </a>
        } @else {
          <a
            routerLink="/admin/login"
            (click)="closeMobileMenu()"
            class="py-4 px-4 text-gray-700 hover:text-gold font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset rounded"
          >
            Login
          </a>
        }
      </div>
    </div>
  }
</nav>
