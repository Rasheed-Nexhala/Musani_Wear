<nav
  class="bg-white border-b border-border shadow-sm sticky top-0 z-40"
  role="navigation"
  aria-label="Main navigation"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16 md:h-20">
      <!-- Logo -->
      <a
        routerLink="/"
        class="text-2xl md:text-3xl font-display font-bold text-charcoal hover:text-gold transition-colors"
      >
        Musani Wear
      </a>

      <!-- Navigation Links -->
      <div class="flex items-center gap-8">
        <a
          routerLink="/"
          routerLinkActive="border-b-2 border-gold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-gray-700 hover:text-gold transition-colors py-2"
        >
          Home
        </a>
        <a
          routerLink="/shop"
          routerLinkActive="border-b-2 border-gold"
          class="text-gray-700 hover:text-gold transition-colors py-2"
        >
          Shop
        </a>
        @if (isAuthenticated$ | async) {
          <a
            routerLink="/admin"
            class="text-gray-700 hover:text-gold transition-colors py-2"
          >
            Admin
          </a>
        }
      </div>
    </div>
  </div>
</nav>
