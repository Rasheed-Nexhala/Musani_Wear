@if (whatsappUrl$ | async; as url) {
  @if (url) {
    <a
      [href]="url"
      target="_blank"
      rel="noopener noreferrer"
      class="fixed bottom-8 right-8 z-40 flex items-center justify-center w-16 h-16 rounded-full bg-whatsapp text-white shadow-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-whatsapp focus:ring-offset-2"
      aria-label="Chat on WhatsApp"
      title="Chat on WhatsApp"
    >
      <span class="text-2xl" aria-hidden="true">💬</span>
    </a>
  }
}
