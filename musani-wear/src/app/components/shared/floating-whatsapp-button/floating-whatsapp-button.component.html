@if (whatsappUrl$ | async; as url) {
  @if (url) {
    <a
      [href]="url"
      target="_blank"
      rel="noopener noreferrer"
      class="fixed bottom-6 right-4 md:bottom-8 md:right-8 z-40 flex items-center justify-center w-14 h-14 md:w-16 md:h-16 min-w-[48px] min-h-[48px] rounded-full bg-whatsapp text-white shadow-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-whatsapp focus:ring-offset-2"
      aria-label="Chat on WhatsApp"
      title="Chat on WhatsApp"
    >
      <span class="text-2xl" aria-hidden="true">💬</span>
    </a>
  }
}
