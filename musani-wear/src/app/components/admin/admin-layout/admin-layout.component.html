<div class="min-h-screen bg-cream flex">
  <!-- Sidebar -->
  <aside
    class="w-64 bg-charcoal text-white flex-shrink-0 hidden lg:flex flex-col"
    aria-label="Admin sidebar"
  >
    <div class="p-6 border-b border-white/10">
      <a routerLink="/admin" class="font-display text-xl font-bold text-gold">
        Musani Wear
      </a>
      <p class="text-sm text-white/70 mt-1">Admin Panel</p>
    </div>

    <nav class="flex-1 p-4 space-y-1" aria-label="Admin navigation">
      <a
        routerLink="/admin"
        routerLinkActive="bg-gold/20 text-gold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="block px-4 py-3 rounded-md hover:bg-white/10 transition font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 focus:ring-offset-charcoal"
      >
        Dashboard
      </a>
      <a
        routerLink="/admin/products"
        routerLinkActive="bg-gold/20 text-gold"
        class="block px-4 py-3 rounded-md hover:bg-white/10 transition font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 focus:ring-offset-charcoal"
      >
        Products
      </a>
      <a
        routerLink="/admin/categories"
        routerLinkActive="bg-gold/20 text-gold"
        class="block px-4 py-3 rounded-md hover:bg-white/10 transition font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 focus:ring-offset-charcoal"
      >
        Categories
      </a>
      <a
        routerLink="/admin/settings"
        routerLinkActive="bg-gold/20 text-gold"
        class="block px-4 py-3 rounded-md hover:bg-white/10 transition font-medium min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 focus:ring-offset-charcoal"
      >
        Settings
      </a>
    </nav>

    <div class="p-4 border-t border-white/10">
      <button
        type="button"
        (click)="logout()"
        class="w-full px-4 py-3 text-left rounded-md hover:bg-error/20 text-error/90 hover:text-error transition font-medium min-h-[48px] focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 focus:ring-offset-charcoal"
        aria-label="Log out of admin panel"
      >
        Logout
      </button>
    </div>
  </aside>

  <!-- Mobile top bar -->
  <div class="lg:hidden fixed top-0 left-0 right-0 z-40 bg-charcoal text-white px-4 py-3 flex items-center justify-between">
    <a routerLink="/admin" class="font-display font-bold text-gold focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2 rounded min-h-[48px] flex items-center" aria-label="Musani Wear Admin - Home">Musani Wear</a>
    <details class="relative">
      <summary class="list-none cursor-pointer px-3 py-2 rounded hover:bg-white/10 min-h-[48px] min-w-[48px] flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2" aria-label="Open admin menu">
        <span class="sr-only">Open menu</span>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </summary>
      <div class="absolute right-0 mt-2 w-48 bg-charcoal rounded-md shadow-lg border border-white/10 py-2">
        <a routerLink="/admin" class="block px-4 py-3 hover:bg-white/10 min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset">Dashboard</a>
        <a routerLink="/admin/products" class="block px-4 py-3 hover:bg-white/10 min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset">Products</a>
        <a routerLink="/admin/categories" class="block px-4 py-3 hover:bg-white/10 min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset">Categories</a>
        <a routerLink="/admin/settings" class="block px-4 py-3 hover:bg-white/10 min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset">Settings</a>
        <button type="button" (click)="logout()" class="w-full text-left px-4 py-3 text-error hover:bg-error/20 min-h-[48px] flex items-center focus:outline-none focus:ring-2 focus:ring-gold focus:ring-inset" aria-label="Log out of admin panel">
          Logout
        </button>
      </div>
    </details>
  </div>

  <!-- Main content (app shell provides main landmark) -->
  <div class="flex-1 min-w-0 pt-16 lg:pt-0" role="region" aria-label="Admin content">
    <div class="p-4 md:p-8">
      <router-outlet />
    </div>
  </div>
</div>
