<div class="space-y-4">
  <label class="block text-sm font-semibold text-charcoal">Product Images</label>

  @if (existingImages().length > 0) {
    <div class="flex flex-wrap gap-3">
      @for (url of existingImages(); track url) {
        <div class="relative group">
          <img
            [src]="url"
            alt="Product"
            class="w-24 h-24 object-cover rounded-md border-2 border-border"
          />
          <button
            type="button"
            (click)="removeImage(url)"
            class="absolute -top-2 -right-2 w-8 h-8 rounded-full bg-error text-white flex items-center justify-center
                   hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2
                   min-h-[32px] min-w-[32px]"
            aria-label="Remove image"
          >
            <span aria-hidden="true">×</span>
          </button>
        </div>
      }
    </div>
  }

  <div>
    <input
      type="file"
      accept="image/jpeg,image/jpg,image/png,image/webp,image/gif"
      multiple
      (change)="onFileSelected($event)"
      class="block w-full text-sm text-charcoal file:mr-4 file:py-2 file:px-4 file:rounded file:border-0
             file:bg-gold file:text-charcoal file:font-semibold file:cursor-pointer
             hover:file:opacity-90"
    />
  </div>

  @if (validationError) {
    <p
      class="text-sm text-error"
      role="alert"
      aria-live="polite"
    >
      {{ validationError }}
    </p>
  }
</div>
